<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tyrone Command Center</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f1117; color:#d8dce8; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; padding:24px; }
.header { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
.header h1 { font-size:20px; font-weight:600; }
.v1 { font-size:10px; font-weight:600; color:#4fd1c5; font-family:'Courier New',monospace; letter-spacing:1px; padding:3px 8px; border:1px solid #2a2e42; border-radius:6px; background:rgba(79,209,197,0.1); }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px; }
.card { background:#161922; border:1px solid #2a2e42; border-radius:12px; padding:20px; }
.card h2 { font-size:14px; color:#8890a8; margin-bottom:12px; text-transform:uppercase; letter-spacing:1px; }
.stat { font-size:28px; font-weight:700; color:#4fd1c5; }
.stat-label { font-size:12px; color:#8890a8; margin-top:4px; }
.status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
.green { background:#4ade80; }
.dim { background:#505870; }
.agent-list { list-style:none; }
.agent-list li { padding:8px 0; border-bottom:1px solid #1c2030; font-size:14px; color:#8890a8; }
.agent-list li:last-child { border:none; }
.research-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #1c2030; }
.research-item:last-child { border:none; }
.toggle { position:relative; width:36px; height:20px; }
.toggle input { opacity:0; width:0; height:0; }
.toggle .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#505870; border-radius:10px; transition:.2s; }
.toggle input:checked + .slider { background:#4fd1c5; }
.toggle .slider:before { content:''; position:absolute; height:14px; width:14px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.2s; }
.toggle input:checked + .slider:before { transform:translateX(16px); }
.time { font-size:32px; font-weight:700; color:#4fd1c5; font-family:'Courier New',monospace; }
</style>
</head>
<body>

<div class="header">
  <h1>Tyrone Command Center</h1>
  <span class="v1">v1</span>
</div>

<div class="grid">
  <div class="card">
    <h2>Status</h2>
    <div class="time" id="clock"></div>
    <div class="stat-label" id="date-display"></div>
  </div>

  <div class="card">
    <h2>Active Agents</h2>
    <ul class="agent-list" id="agent-list">
      <li><span class="status-dot dim"></span>No active agents</li>
    </ul>
  </div>

  <div class="card">
    <h2>Nightly Research</h2>
    <div id="research-toggles">
      <div class="research-item">
        <span>EcoPro Business Growth</span>
        <label class="toggle"><input type="checkbox" checked disabled><span class="slider"></span></label>
      </div>
      <div class="research-item">
        <span>Stock Trading Research</span>
        <label class="toggle"><input type="checkbox" checked disabled><span class="slider"></span></label>
      </div>
      <div class="research-item">
        <span>Website Lead Gen</span>
        <label class="toggle"><input type="checkbox" disabled><span class="slider"></span></label>
      </div>
      <div class="research-item">
        <span>Idea Discovery</span>
        <label class="toggle"><input type="checkbox" disabled><span class="slider"></span></label>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Quick Links</h2>
    <ul class="agent-list">
      <li><a href="https://demo.keelanodoherty.org" style="color:#4fd1c5;text-decoration:none">Demo Sites Hub</a></li>
      <li><a href="https://ecopro.keelanodoherty.org" style="color:#4fd1c5;text-decoration:none">EcoPro Site</a></li>
      <li><a href="https://github.com/Keelan4604" style="color:#4fd1c5;text-decoration:none">GitHub</a></li>
    </ul>
  </div>
</div>

<script>
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('date-display').textContent = now.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
updateClock();
setInterval(updateClock, 1000);
</script>

</body>
</html>
