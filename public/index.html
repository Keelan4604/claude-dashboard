<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Tyrone Command Center</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --electric: #6c63ff;
    --electric-dim: rgba(108,99,255,0.12);
    --electric-glow: rgba(108,99,255,0.3);
    --mint: #4fd1c5;
    --mint-dim: rgba(79,209,197,0.12);
    --coral: #ff6b6b;
    --coral-dim: rgba(255,107,107,0.12);
    --gold: #fbbf24;
    --gold-dim: rgba(251,191,36,0.12);
    --green: #68d391;
    --green-dim: rgba(104,211,145,0.12);
    --blue: #63b3ed;
    --blue-dim: rgba(99,179,237,0.12);
    --purple: #b794f4;
    --purple-dim: rgba(183,148,244,0.12);
    --orange: #f6ad55;
    --orange-dim: rgba(246,173,85,0.12);
    --rose: #f687b3;
    --rose-dim: rgba(246,135,179,0.12);
  }

  [data-theme="dark"] {
    --bg: #0c0e14;
    --surface: #13151e;
    --surface2: #1a1d2b;
    --surface3: #222638;
    --border: #262a3d;
    --border-hover: #363b54;
    --text: #e8eaf0;
    --dim: #8b90a5;
    --muted: #4a4f68;
    --accent: var(--electric);
    --accent-dim: var(--electric-dim);
    --glow: var(--electric-glow);
    --card-shadow: 0 2px 12px rgba(0,0,0,0.5);
    --card-hover-shadow: 0 6px 30px rgba(108,99,255,0.12);
  }

  [data-theme="light"] {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --surface2: #eef0f7;
    --surface3: #e2e5f0;
    --border: #d4d8e8;
    --border-hover: #b8beD4;
    --text: #1a1d2b;
    --dim: #5a5f78;
    --muted: #8b90a5;
    --accent: #5046e5;
    --accent-dim: rgba(80,70,229,0.08);
    --glow: rgba(80,70,229,0.15);
    --card-shadow: 0 1px 8px rgba(0,0,0,0.06);
    --card-hover-shadow: 0 4px 20px rgba(80,70,229,0.1);
  }

  html { font-size: 14px; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: background .35s, color .35s;
  }

  .drag { -webkit-app-region: drag; height: 28px; flex-shrink: 0; }

  /* ============ TOP BAR ============ */
  .top-bar {
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 54px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
    gap: 16px;
  }
  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -.5px;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .logo-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--glow);
    animation: glow-pulse 3s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%,100% { box-shadow: 0 0 8px var(--glow); }
    50% { box-shadow: 0 0 22px var(--glow), 0 0 44px var(--glow); }
  }

  .tab-bar { display: flex; gap: 0; flex: 1; margin-left: 12px; }
  .tab {
    padding: 17px 18px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .25s;
    letter-spacing: .3px;
    user-select: none;
  }
  .tab:hover { color: var(--dim); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px; height: 18px;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 10px; font-weight: 700;
    border-radius: 9px;
    padding: 0 5px;
    margin-left: 6px;
  }

  .controls { display: flex; gap: 8px; margin-left: auto; align-items: center; }
  .theme-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    cursor: pointer;
    transition: all .25s;
    color: var(--dim);
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .palette-bar { display: flex; gap: 4px; align-items: center; }
  .palette-dot {
    width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: all .2s;
  }
  .palette-dot:hover { transform: scale(1.2); }
  .palette-dot.active { border-color: var(--text); box-shadow: 0 0 8px var(--glow); }

  /* ============ PANELS ============ */
  .panel { display: none; flex: 1; overflow-y: auto; padding: 24px; }
  .panel.active { display: block; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    transition: all .3s cubic-bezier(.16,1,.3,1);
    box-shadow: var(--card-shadow);
  }
  .card:hover { border-color: var(--border-hover); box-shadow: var(--card-hover-shadow); }
  .card-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .7px; color: var(--muted); margin-bottom: 8px;
  }
  .section-head {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .7px; color: var(--muted); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-head::before {
    content: ''; width: 3px; height: 14px; border-radius: 2px;
    background: var(--accent);
  }
  .panel-footer {
    margin-top: 20px; padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 13px; color: var(--dim);
    font-family: 'JetBrains Mono',monospace;
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-footer .timestamp { font-weight: 600; color: var(--text); }
  .panel-footer .seconds-ago { color: var(--accent); font-weight: 600; margin-left: 6px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .anim { animation: fadeUp .45s cubic-bezier(.16,1,.3,1) both; }

  /* ============ USAGE TAB ============ */
  .usage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .usage-big {
    font-size: 32px; font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: -1px; color: var(--accent);
  }
  .usage-sub { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 3px; }
  .bar-track { width: 100%; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 12px; }
  .bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--electric), #818cf8);
    transition: width .8s cubic-bezier(.16,1,.3,1);
  }
  .bar-fill.warn { background: linear-gradient(90deg, var(--orange), var(--gold)); }
  .bar-fill.crit { background: linear-gradient(90deg, var(--coral), #fc8181); }

  .agent-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 6px; box-shadow: var(--card-shadow);
  }
  .agent-dot { width: 7px; height: 7px; border-radius: 50%; animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
  .agent-dot.green { background: var(--green); box-shadow: 0 0 8px var(--green-dim); }
  .agent-dot.blue { background: var(--blue); box-shadow: 0 0 8px var(--blue-dim); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  .agent-name { font-size: 12px; font-weight: 600; flex: 1; }
  .agent-ctx { font-size: 11px; color: var(--muted); flex: 1; }
  .agent-time { font-size: 11px; font-family: 'JetBrains Mono',monospace; color: var(--muted); }
  .optimizer-badge { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono',monospace; margin-top: 12px; }

  /* ============ PROJECTS TAB ============ */
  .project-list { display: flex; flex-direction: column; gap: 8px; }
  .project-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    transition: all .3s cubic-bezier(.16,1,.3,1);
    box-shadow: var(--card-shadow);
  }
  .project-card:hover { border-color: var(--border-hover); box-shadow: var(--card-hover-shadow); }
  .project-card.expanded { border-color: var(--accent); }
  .project-header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px; cursor: pointer;
  }
  .project-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .project-meta { flex: 1; min-width: 0; }
  .project-name { font-size: 15px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
  .project-oneliner { font-size: 12px; color: var(--dim); margin-top: 3px; }
  .project-tags { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .ptag {
    font-size: 9px; font-weight: 700; padding: 3px 9px;
    border-radius: 4px; text-transform: uppercase; letter-spacing: .5px;
  }
  .ptag-money { background: var(--gold-dim); color: var(--gold); }
  .ptag-active { background: var(--green-dim); color: var(--green); }
  .ptag-paused { background: var(--orange-dim); color: var(--orange); }
  .ptag-school { background: var(--purple-dim); color: var(--purple); }
  .ptag-tool { background: var(--mint-dim); color: var(--mint); }
  .project-chevron { font-size: 16px; color: var(--muted); transition: transform .3s; flex-shrink: 0; }
  .project-card.expanded .project-chevron { transform: rotate(180deg); }

  .project-body { display: none; border-top: 1px solid var(--border); }
  .project-card.expanded .project-body { display: block; }
  .project-content {
    padding: 20px; font-size: 13px; color: var(--dim); line-height: 1.75;
  }
  .project-content h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; font-weight: 700; color: var(--text);
    margin: 18px 0 8px 0; text-transform: uppercase; letter-spacing: .5px;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .project-content h3:first-child { margin-top: 0; }
  .project-content ul { list-style: none; padding: 0; }
  .project-content li {
    padding: 5px 0 5px 16px; position: relative;
  }
  .project-content li::before {
    content: ''; position: absolute; left: 0; top: 12px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); opacity: .5;
  }
  .project-content a { color: var(--accent); text-decoration: none; }
  .project-content a:hover { text-decoration: underline; }
  .project-content .status-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0;
  }
  .project-content .stat-box {
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; text-align: center;
  }
  .stat-box .stat-num {
    font-family: 'Space Grotesk', sans-serif; font-size: 24px;
    font-weight: 700; color: var(--accent);
  }
  .stat-box .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
  .project-content table {
    width: 100%; border-collapse: collapse; margin: 10px 0;
    font-size: 12px;
  }
  .project-content th {
    text-align: left; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px;
    color: var(--muted); padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .project-content td {
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    color: var(--dim);
  }
  .project-content .highlight {
    background: var(--accent-dim); border: 1px solid var(--accent);
    border-radius: 8px; padding: 12px 16px; margin: 10px 0;
    color: var(--text); font-weight: 500;
  }
  .project-content .warn-box {
    background: var(--coral-dim); border: 1px solid var(--coral);
    border-radius: 8px; padding: 12px 16px; margin: 10px 0;
    color: var(--text); font-weight: 500;
  }

  /* ============ COLD CALLING TAB ============ */
  .calling-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .calling-stats { display: flex; gap: 14px; flex-wrap: wrap; }
  .calling-stat {
    text-align: center; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 18px; min-width: 85px;
    box-shadow: var(--card-shadow); transition: all .25s;
  }
  .calling-stat:hover { border-color: var(--border-hover); transform: translateY(-1px); }
  .calling-stat .num { font-family: 'Space Grotesk',sans-serif; font-size: 22px; font-weight: 700; }
  .calling-stat .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 3px; }
  .calling-stat.green .num { color: var(--green); }
  .calling-stat.orange .num { color: var(--orange); }
  .calling-stat.blue .num { color: var(--blue); }

  .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--dim); cursor: pointer; transition: all .25s;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .lead-list { display: flex; flex-direction: column; gap: 5px; }
  .lead-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; transition: all .25s; box-shadow: var(--card-shadow);
  }
  .lead-card:hover { border-color: var(--border-hover); }
  .lead-card.expanded { border-color: var(--accent); box-shadow: var(--card-hover-shadow); }
  .lead-header {
    display: grid; grid-template-columns: 40px 1.3fr .9fr .7fr .6fr auto 70px 28px;
    align-items: center; padding: 10px 14px; cursor: pointer; gap: 10px;
  }
  .lead-score { font-family: 'JetBrains Mono',monospace; font-size: 13px; font-weight: 700; text-align: center; border-radius: 8px; padding: 4px 0; }
  .lead-score.hot { background: var(--green-dim); color: var(--green); }
  .lead-score.warm { background: var(--gold-dim); color: var(--gold); }
  .lead-score.cool { background: var(--orange-dim); color: var(--orange); }
  .lead-score.cold { background: var(--coral-dim); color: var(--coral); }
  .lead-biz { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lead-industry { font-size: 11px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lead-loc { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lead-phone { font-size: 11px; font-family: 'JetBrains Mono',monospace; color: var(--mint); white-space: nowrap; }
  .called-toggle {
    display: inline-flex; align-items: center; padding: 4px 10px;
    border-radius: 6px; font-size: 10px; font-weight: 700; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--dim);
    transition: all .25s; white-space: nowrap;
  }
  .called-toggle:hover { border-color: var(--accent); }
  .called-toggle.called { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .lead-status {
    font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 5px;
    text-transform: uppercase; letter-spacing: .5px; text-align: center; white-space: nowrap;
  }
  .lead-status.sent { background: var(--green-dim); color: var(--green); }
  .lead-status.draft { background: var(--blue-dim); color: var(--blue); }
  .lead-status.call { background: var(--orange-dim); color: var(--orange); }
  .lead-status.fb { background: var(--purple-dim); color: var(--purple); }
  .lead-status.new { background: var(--gold-dim); color: var(--gold); }
  .lead-chevron { font-size: 14px; color: var(--muted); transition: transform .25s; text-align: center; }
  .lead-card.expanded .lead-chevron { transform: rotate(180deg); }
  .lead-details { display: none; padding: 0 14px 14px; border-top: 1px solid var(--border); }
  .lead-card.expanded .lead-details { display: block; }
  .lead-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
  .lead-detail-box { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .lead-detail-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 6px; }
  .lead-detail-value { font-size: 12px; color: var(--text); line-height: 1.6; }
  .lead-detail-value a { color: var(--accent); text-decoration: none; }
  .lead-detail-value a:hover { text-decoration: underline; }
  .lead-script-box {
    grid-column: 1 / -1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px;
  }
  .lead-script-box .script-text { font-size: 12px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }
  .script-points { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .script-point {
    font-size: 11px; color: var(--dim); line-height: 1.5;
    padding: 7px 12px; background: var(--surface); border-radius: 6px;
    border-left: 3px solid var(--accent);
  }
  .call-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, var(--green), #48bb78);
    color: #000; padding: 10px 20px; border-radius: 8px;
    font-size: 12px; font-weight: 700; text-decoration: none;
    margin-top: 14px; transition: all .25s;
    box-shadow: 0 2px 8px rgba(104,211,145,0.3);
  }
  .call-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(104,211,145,0.4); }

  /* ============ WORK SESSIONS TAB ============ */
  .work-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 6px; overflow: hidden;
    transition: all .25s; box-shadow: var(--card-shadow);
  }
  .work-item:hover { border-color: var(--border-hover); }
  .work-item.expanded { border-color: var(--accent); box-shadow: var(--card-hover-shadow); }
  .work-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer;
  }
  .work-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .work-info { flex: 1; }
  .work-name { font-size: 13px; font-weight: 600; }
  .work-desc { font-size: 11px; color: var(--dim); margin-top: 2px; }
  .work-time { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono',monospace; margin-top: 2px; }
  .work-chevron { font-size: 14px; color: var(--muted); transition: transform .25s; }
  .work-item.expanded .work-chevron { transform: rotate(180deg); }
  .work-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .work-item.expanded .work-body { display: block; }
  .work-preview {
    font-size: 11px; color: var(--dim); line-height: 1.7;
    white-space: pre-wrap; margin-top: 12px; max-height: 300px;
    overflow-y: auto; padding: 12px; background: var(--bg);
    border-radius: 8px; border: 1px solid var(--border);
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<div class="drag"></div>
<div class="top-bar">
  <div class="logo"><div class="logo-dot"></div>Tyrone</div>
  <div class="tab-bar">
    <div class="tab active" data-tab="usage">Home</div>
    <div class="tab" data-tab="calling">Cold Calling <span class="badge" id="callCount">0</span></div>
    <div class="tab" data-tab="sessions">Work Sessions</div>
  </div>
  <div class="controls">
    <div class="palette-bar" id="paletteBar">
      <div class="palette-dot active" style="background:#6c63ff" onclick="setAccent('electric','#6c63ff')" title="Electric"></div>
      <div class="palette-dot" style="background:#4fd1c5" onclick="setAccent('mint','#4fd1c5')" title="Mint"></div>
      <div class="palette-dot" style="background:#f6ad55" onclick="setAccent('amber','#f6ad55')" title="Amber"></div>
      <div class="palette-dot" style="background:#fc8181" onclick="setAccent('coral','#fc8181')" title="Coral"></div>
      <div class="palette-dot" style="background:#68d391" onclick="setAccent('emerald','#68d391')" title="Emerald"></div>
      <div class="palette-dot" style="background:#f687b3" onclick="setAccent('rose','#f687b3')" title="Rose"></div>
      <div class="palette-dot" style="background:#fbbf24" onclick="setAccent('gold','#fbbf24')" title="Gold"></div>

<script>
// ============ THEME ============
function toggleTheme() {
  var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('tyrone-theme', next);
  document.getElementById('themeIcon').innerHTML = next === 'dark' ? '&#9789;' : '&#9788;';
}
(function() {
  var s = localStorage.getItem('tyrone-theme');
  if (s) { document.documentElement.setAttribute('data-theme', s); document.getElementById('themeIcon').innerHTML = s === 'dark' ? '&#9789;' : '&#9788;'; }
})();

// ============ ACCENT COLOR ============
function setAccent(name, hex) {
  var r = document.documentElement.style;
  r.setProperty('--accent', hex);
  r.setProperty('--accent-dim', hex.replace(')', ',0.12)').replace('rgb','rgba').replace('#',''));
  // Compute accent-dim properly
  var dim = 'rgba(' + parseInt(hex.slice(1,3),16) + ',' + parseInt(hex.slice(3,5),16) + ',' + parseInt(hex.slice(5,7),16) + ',0.12)';
  var glow = 'rgba(' + parseInt(hex.slice(1,3),16) + ',' + parseInt(hex.slice(3,5),16) + ',' + parseInt(hex.slice(5,7),16) + ',0.3)';
  r.setProperty('--accent', hex);
  r.setProperty('--accent-dim', dim);
  r.setProperty('--glow', glow);
  localStorage.setItem('tyrone-accent', hex);
  localStorage.setItem('tyrone-accent-name', name);
  document.querySelectorAll('.palette-dot').forEach(function(d) { d.classList.remove('active'); });
  document.querySelector('.palette-dot[title="' + name.charAt(0).toUpperCase() + name.slice(1) + '"]').classList.add('active');
}
(function() {
  var saved = localStorage.getItem('tyrone-accent');
  var savedName = localStorage.getItem('tyrone-accent-name');
  if (saved) setAccent(savedName || 'electric', saved);
})();

// ============ TABS ============
document.querySelectorAll('.tab').forEach(function(tab) {

    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');

});

function fmt(ms) { var m=Math.floor(ms/60000),h=Math.floor(m/60); if(h>0)return h+'h '+(m%60)+'m'; if(m>0)return m+'m'; return Math.floor(ms/1000)+'s'; }
function setBar(id,pct) { var b=document.getElementById(id); b.style.width=pct+'%'; b.className='bar-fill'+(pct>=90?' crit':pct>=70?' warn':''); }
function scoreClass(s) { return s>=85?'hot':s>=75?'warm':s>=65?'cool':'cold'; }
function statusClass(s) { s=(s||'').toLowerCase(); if(s.includes('sent'))return'sent'; if(s.includes('draft'))return'draft'; if(s.includes('call'))return'call'; if(s.includes('fb'))return'fb'; return'new'; }

function parseOldWebsite(n) { if(!n)return''; if(n.includes('Facebook only')||n.includes('facebook only'))return'Facebook only'; if(n.includes('Wix'))return'Wix stub'; if(n.includes('Google Sites'))return'Google Sites stub'; var m=n.match(/(https?:\/\/[^\s,;]+)/); if(m)return m[1]; if(n.includes('stub'))return'Basic stub'; if(n.includes('No website')||n.includes('no website'))return'No website'; return''; }

function timeAgo(d) { var ms=Date.now()-new Date(d).getTime(),m=Math.floor(ms/60000),h=Math.floor(m/60),dy=Math.floor(h/24); if(dy>0)return dy+'d ago'; if(h>0)return h+'h ago'; if(m>0)return m+'m ago'; return'just now'; }

// ============ SMART FETCH (API first, static fallback) ============
async function smartFetch(apiPath, staticPath) {
  try { var r = await fetch(apiPath); if (r.ok) return await r.json(); } catch {}
  try { var r2 = await fetch(staticPath); if (r2.ok) return await r2.json(); } catch {}
  return null;
}

function updateCallStats() {

  document.getElementById('callCount').textContent=withPhone;
}
function filterLeads(leads) {
  var cm=getCalledStatus();
  switch(currentFilter) {
    case'call':return leads.filter(function(l){return l.phone&&(l.status||'').toLowerCase().includes('call');});
    case'demo':return leads.filter(function(l){return l.demoSite;});
    case'sent':return leads.filter(function(l){return(l.emailSent||'').toLowerCase().includes('sent');});
    case'phone':return leads.filter(function(l){return l.phone;});
    case'noresponse':return leads.filter(function(l){return(l.response||'').toLowerCase().includes('no')&&(l.emailSent||'').toLowerCase().includes('sent');});
    case'called':return leads.filter(function(l){return cm[l.business];});
    case'notcalled':return leads.filter(function(l){return l.phone&&!cm[l.business];});
    default:return leads;
  }
}

function generateScript(lead) {
  var name=lead.business, industry=lead.industry||'your business', loc=lead.location||'', demo=lead.demoSite, notes=lead.notes||'', score=lead.score;
  var opener='Hey, is this '+name+'? My name\'s Keelan, I\'m a web designer based out of Alabama.';
  var hook='', pitch='', close='', objections=[], points=[];
  var ownerMatch=notes.match(/[Oo]wner\s+(\w+)/);
  if(ownerMatch) opener='Hey, is this '+ownerMatch[1]+'? My name\'s Keelan, I\'m a web designer based out of Alabama.';
  if(demo){
    hook='I came across '+name+' online and was really impressed with what y\'all do. I actually went ahead and built a free website concept for your business, just to show you what it could look like.';
    pitch='It\'s a fully designed site with your services, your phone number, click-to-call buttons, the whole thing. Totally free, no obligation. I just wanted to show you what\'s possible.';
    close='Can I shoot you a text with the link so you can check it out on your phone real quick?';
  } else {
    hook='I\'ve been working with local '+industry.toLowerCase()+' companies on their online presence, and I noticed '+name+' doesn\'t have a website showing up on Google right now.';
    pitch='Most people search Google before they call anyone. "Best '+industry.toLowerCase()+' near me" gets hundreds of searches a month in '+(loc||'your area')+'. Without a website, all those potential customers are going to your competitors instead.';
    close='I build professional websites for businesses like yours. Can I send you a couple examples of sites I\'ve done for similar companies?';
  }
  if(demo) points.push('TEXT THEM THE DEMO LINK RIGHT AWAY if they say yes');
  if(ownerMatch) points.push('Ask for '+ownerMatch[1]+' by name if someone else answers');
  if(notes.includes('reviews')||notes.includes('stars')){var sm=notes.match(/([\d.]+)\s*stars?/i);if(sm)points.push('Mention their '+sm[1]+'-star reviews. "Your reviews are great, your website should match that reputation."');else points.push('Mention their good reviews. Shows you did your homework.');}
  if(notes.includes('Facebook'))points.push('"Right now people can only find you on Facebook. A website puts you on Google where most customers actually search."');
  if(notes.includes('no website')||notes.includes('No website'))points.push('"When someone Googles \''+industry.toLowerCase()+' near me\' in '+(loc||'your area')+', you\'re invisible right now. A site fixes that."');
  if(notes.match(/\d+\s*years?/i)){var ym=notes.match(/(\d+)\+?\s*years?/i);if(ym)points.push('"'+ym[1]+' years in business is incredible. Your online presence should reflect that kind of experience."');}
  if(score>=85)points.push('HIGH PRIORITY lead. Strong business, big opportunity.');
  if(notes.includes('BBB')||notes.includes('licensed')||notes.includes('certified'))points.push('Mention their credentials/certifications. Builds rapport.');
  points.push('If no answer: try again in 2 days, different time of day');
  points.push('If voicemail: "Hey this is Keelan, I\'m a web designer. I put together a free website concept for '+name+'. Give me a call back at 205-394-8346, or I\'ll try you again soon."');
  objections.push('"I don\'t need a website" -> "I totally get that. But 80% of customers Google a business before calling. Even a simple one-page site with your number helps."');
  objections.push('"How much does it cost?" -> "Depends on what you need, but I keep it affordable for local businesses. Can I send you some examples first so you can see the quality?"');
  objections.push('"I\'ll think about it" -> "No rush at all. Can I text you the link so you have it when you\'re ready to look?"');
  if(demo) objections.push('"Send me info" -> Text the demo link immediately. Follow up in 2 days.');
  return{opener:opener,hook:hook,pitch:pitch,close:close,objections:objections,points:points};
}

    html+='<div class="lead-detail-box"><div class="lead-detail-label">Tracking</div><div class="lead-detail-value"><div>Email: <span style="color:'+((l.emailSent||'').includes('Sent')?'var(--green)':'var(--muted)')+'">'+(l.emailSent||'Not sent')+'</span></div><div>Follow-up: <span style="color:var(--muted)">'+(l.followUp||'None')+'</span></div><div>Response: <span style="color:'+((l.response||'').includes('No')?'var(--coral)':'var(--muted)')+'">'+(l.response||'-')+'</span></div>'+(l.dateSent?'<div style="font-size:10px;color:var(--muted);margin-top:4px">Sent: '+l.dateSent+'</div>':'')+'</div></div>';
    html+='<div class="lead-detail-box"><div class="lead-detail-label">Notes</div><div class="lead-detail-value" style="font-size:11px;color:var(--dim)">'+(l.notes||'No notes')+'</div></div>';
    html+='<div class="lead-script-box"><div class="lead-detail-label">&#128222; Cold Call Script</div><div class="script-text"><strong>OPENER:</strong> '+sc.opener+'\n\n<strong>HOOK:</strong> '+sc.hook+'\n\n<strong>PITCH:</strong> '+sc.pitch+'\n\n<strong>CLOSE:</strong> '+sc.close+'</div><div class="lead-detail-label" style="margin-top:14px">Talking Points</div><div class="script-points">'+sc.points.map(function(p){return'<div class="script-point">'+p+'</div>';}).join('')+'</div><div class="lead-detail-label" style="margin-top:14px">Objection Handling</div><div class="script-points">'+sc.objections.map(function(o){return'<div class="script-point" style="border-left-color:var(--orange)">'+o+'</div>';}).join('')+'</div>'+(l.phone?'<a href="'+phoneLink+'" class="call-btn">&#128222; Call '+l.business+'</a>':'')+'</div></div></div></div>';
  }
  el.innerHTML=html||'<div style="color:var(--muted);padding:20px;text-align:center">No leads match this filter</div>';
}
function toggleLead(i){document.getElementById('lead-'+i).classList.toggle('expanded');}
document.getElementById('filterBar').addEventListener('click',function(e){if(!e.target.classList.contains('filter-btn'))return;document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});e.target.classList.add('active');currentFilter=e.target.dataset.filter;renderLeads();});

// ============ WORK SESSIONS ============
var FILE_INFO={
  'strategy.md':{icon:'&#129504;',bg:'var(--accent-dim)',label:'Revenue Strategy',desc:'Living document with current hypothesis, what\'s working/failing, search strategy, experiments, priorities, and overnight updates.'},
  'morning':{icon:'&#9728;',bg:'var(--gold-dim)',label:'Morning Report',desc:'What the overnight agent accomplished and what needs attention today.'},
  'evening':{icon:'&#127769;',bg:'var(--purple-dim)',label:'Evening Report',desc:'End-of-day progress summary, metrics, and next priorities.'},
  'overnight':{icon:'&#127769;',bg:'var(--mint-dim)',label:'Overnight Session',desc:'Log from autonomous 2AM agent run. Lead gen, idea research, site builds.'},
  'idea':{icon:'&#128161;',bg:'var(--orange-dim)',label:'Business Ideas',desc:'Scored opportunities discovered by the idea-scout agent.'},
  'lead':{icon:'&#128176;',bg:'var(--green-dim)',label:'Lead Research',desc:'Prospecting notes and lead research findings.'},
  'job':{icon:'&#128188;',bg:'var(--blue-dim)',label:'Career Materials',desc:'Resume, cover letters, job search documents.'},
  'contact':{icon:'&#128222;',bg:'var(--mint-dim)',label:'Contact Info',desc:'Saved contact details and communication records.'},
  'style':{icon:'&#127912;',bg:'var(--rose-dim)',label:'Style Preferences',desc:'Design preferences, brand guidelines, visual standards.'},
  'claude-tools':{icon:'&#128295;',bg:'var(--accent-dim)',label:'Tools Reference',desc:'Breakdown of available Claude tools and MCP integrations.'},
  'google-drive':{icon:'&#128193;',bg:'var(--blue-dim)',label:'Google Drive',desc:'Drive file references and organization notes.'},
  'hero-blurb':{icon:'&#9997;',bg:'var(--gold-dim)',label:'Hero Blurbs',desc:'Website hero section copy ideas and variations.'},
  'default':{icon:'&#128196;',bg:'var(--accent-dim)',label:'',desc:'Workspace file.'}
};
function getFileInfo(f){
  if(f==='strategy.md')return FILE_INFO['strategy.md'];
  for(var k of['morning','evening','overnight','idea','lead','job','contact','style','claude-tools','google-drive','hero-blurb']){
    if(f.toLowerCase().includes(k))return{icon:FILE_INFO[k].icon,bg:FILE_INFO[k].bg,label:FILE_INFO[k].label+': '+f.replace('overnight/','').replace('.md',''),desc:FILE_INFO[k].desc};
  }
  return{icon:FILE_INFO['default'].icon,bg:FILE_INFO['default'].bg,label:f.replace('.md',''),desc:FILE_INFO['default'].desc};
}
async function fetchWorkSessions(){
  try{
    var sessions=await smartFetch('/api/work-sessions',null);
    if(!sessions){document.getElementById('workList').innerHTML='<div style="color:var(--muted);padding:20px;text-align:center">Connect locally for work session data</div>';return;}
    var el=document.getElementById('workList'),html='';
    for(var i=0;i<sessions.length;i++){var s=sessions[i],info=getFileInfo(s.file);
      html+='<div class="work-item" id="work-'+i+'"><div class="work-header" onclick="document.getElementById(\'work-'+i+'\').classList.toggle(\'expanded\')"><div class="work-icon" style="background:'+info.bg+'">'+info.icon+'</div><div class="work-info"><div class="work-name">'+info.label+'</div><div class="work-desc">'+info.desc+'</div><div class="work-time">Updated '+timeAgo(s.modified)+'</div></div><div class="work-chevron">&#9660;</div></div><div class="work-body"><div class="work-preview">'+(s.preview||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div></div>';
    }
    el.innerHTML=html||'<div style="color:var(--muted);padding:20px;text-align:center">No work sessions found</div>';
    lastFetch.sessions=Date.now(); document.getElementById('sessionsUpdated').textContent='Updated '+new Date().toLocaleTimeString();
  }catch(e){document.getElementById('workList').innerHTML='<div style="color:var(--muted);padding:20px">Error: '+e.message+'</div>';}
}

// ============ LIVE TIMESTAMPS ============
var lastFetch = { usage: 0, leads: 0, sessions: 0 };
function updateAgos() {
  var now = Date.now();
  var pairs = [['usageAgo', lastFetch.usage], ['usageAgo2', lastFetch.usage], ['leadsAgo', lastFetch.leads], ['sessionsAgo', lastFetch.sessions]];
  pairs.forEach(function(p) {
    var el = document.getElementById(p[0]);
    if (!el || !p[1]) return;
    var sec = Math.floor((now - p[1]) / 1000);
    el.textContent = '(' + sec + 's ago)';
  });
}
setInterval(updateAgos, 1000);

// ============ INIT ============
async function init(){
  for(var i=0;i<5;i++){try{var r=await fetch('/api/usage');if(r.ok)break;}catch{}await new Promise(function(r){setTimeout(r,300);});}
  renderProjects();fetchUsage();fetchAgents();fetchLeads();fetchWorkSessions();
  setInterval(fetchUsage,15000);setInterval(fetchAgents,5000);setInterval(fetchLeads,60000);setInterval(fetchWorkSessions,120000);
}
init();
</script>
